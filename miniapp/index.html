<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XAUUSD Trader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #0e1117);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .price-card {
            background: linear-gradient(135deg, #1e1e2e, #2a2a3a);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .price {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .change {
            font-size: 16px;
            margin-top: 5px;
        }
        
        .signal-card {
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .signal-buy {
            background: linear-gradient(135deg, #0a3a2a, #0a2a1a);
            border-left: 4px solid #00ff88;
        }
        
        .signal-sell {
            background: linear-gradient(135deg, #3a1a1a, #2a0a0a);
            border-left: 4px solid #ff4444;
        }
        
        .signal-wait {
            background: #1e1e2e;
            border-left: 4px solid #ffd700;
        }
        
        .signal-text {
            font-size: 28px;
            font-weight: bold;
        }
        
        .confidence {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .levels {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .level-card {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        
        .level-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .level-price {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .metric-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .metric-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        
        .chart-container {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
        }
        
        canvas {
            max-height: 300px;
            width: 100%;
        }
        
        .refresh-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .refresh-btn:active {
            opacity: 0.8;
        }
        
        .footer {
            text-align: center;
            font-size: 10px;
            color: #666;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 XAUUSD TRADER</h1>
    </div>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading market data...</div>
    </div>
    
    <div id="content" style="display: none;">
        <div class="price-card">
            <div class="price" id="price">$---</div>
            <div class="change" id="change">---</div>
        </div>
        
        <div id="signal-card" class="signal-card signal-wait">
            <div class="signal-text" id="signal-text">⏸️ WAITING</div>
            <div class="confidence" id="confidence">Confidence: --%</div>
        </div>
        
        <div class="metric-row">
            <div class="metric-card">
                <div class="metric-value" id="rsi">--</div>
                <div class="metric-label">RSI (14)</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="atr">$--</div>
                <div class="metric-label">ATR</div>
            </div>
        </div>
        
        <div class="levels">
            <div class="level-card">
                <div class="level-label">📍 ENTRY</div>
                <div class="level-price" id="entry">$--</div>
            </div>
            <div class="level-card">
                <div class="level-label">🛑 STOP LOSS</div>
                <div class="level-price" id="sl">$--</div>
            </div>
            <div class="level-card">
                <div class="level-label">🎯 TP1</div>
                <div class="level-price" id="tp1">$--</div>
            </div>
            <div class="level-card">
                <div class="level-label">🎯 TP2</div>
                <div class="level-price" id="tp2">$--</div>
            </div>
            <div class="level-card">
                <div class="level-label">🎯 TP3</div>
                <div class="level-price" id="tp3">$--</div>
            </div>
            <div class="level-card">
                <div class="level-label">🎯 TP4</div>
                <div class="level-price" id="tp4">$--</div>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 REFRESH DATA</button>
    </div>
    
    <div class="footer">
        ⚠️ Educational only - Not financial advice
    </div>

    <script>
        let chart = null;
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                return await response.json();
            } catch (e) {
                console.error('Error:', e);
                return null;
            }
        }
        
        function updateUI(data) {
            if (!data) return;
            
            document.getElementById('price').innerText = `$${data.price.toFixed(2)}`;
            document.getElementById('change').innerHTML = data.change > 0 ? `📈 +$${data.change.toFixed(2)}` : `📉 -$${Math.abs(data.change).toFixed(2)}`;
            document.getElementById('rsi').innerText = data.rsi.toFixed(1);
            document.getElementById('atr').innerText = `$${data.atr.toFixed(2)}`;
            document.getElementById('entry').innerText = `$${data.entry.toFixed(2)}`;
            document.getElementById('sl').innerText = `$${data.sl.toFixed(2)}`;
            document.getElementById('tp1').innerText = `$${data.tp1.toFixed(2)}`;
            document.getElementById('tp2').innerText = `$${data.tp2.toFixed(2)}`;
            document.getElementById('tp3').innerText = `$${data.tp3.toFixed(2)}`;
            document.getElementById('tp4').innerText = `$${data.tp4.toFixed(2)}`;
            
            const signalCard = document.getElementById('signal-card');
            const signalText = document.getElementById('signal-text');
            const confidenceSpan = document.getElementById('confidence');
            
            if (data.signal === 'BUY') {
                signalCard.className = 'signal-card signal-buy';
                signalText.innerHTML = '📈 BUY (LONG)';
                confidenceSpan.innerHTML = `Confidence: ${data.confidence}%`;
            } else if (data.signal === 'SELL') {
                signalCard.className = 'signal-card signal-sell';
                signalText.innerHTML = '📉 SELL (SHORT)';
                confidenceSpan.innerHTML = `Confidence: ${data.confidence}%`;
            } else {
                signalCard.className = 'signal-card signal-wait';
                signalText.innerHTML = '⏸️ NO SIGNAL';
                confidenceSpan.innerHTML = `Confidence: ${data.confidence}%`;
            }
            
            if (data.prices && data.prices.length > 0 && chart) {
                chart.data.datasets[0].data = data.prices;
                chart.update();
            }
        }
        
        function initChart(prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map((_, i) => i),
                    datasets: [{
                        label: 'XAUUSD',
                        data: prices,
                        borderColor: '#ffd700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => `$${ctx.raw.toFixed(2)}` } }
                    },
                    scales: {
                        x: { display: false },
                        y: { ticks: { callback: (val) => `$${val}` } }
                    }
                }
            });
        }
        
        async function refreshData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('content').style.display = 'none';
            
            const data = await fetchData();
            
            if (data) {
                if (!chart && data.prices) {
                    initChart(data.prices);
                }
                updateUI(data);
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            tg.HapticFeedback.impactOccurred('light');
        }
        
        refreshData();
        
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
